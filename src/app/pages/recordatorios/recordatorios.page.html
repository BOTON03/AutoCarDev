<ion-header class="ion-no-border">
  <ion-toolbar>
    <div class="top-bar">
      <div class="header-left">
        <i class="fas fa-car header-car-icon"></i>
        <h1 class="page-title">Recordatorios</h1>
      </div>
      <button class="add-btn-circle" (click)="nuevoRecordatorio()">
        <i class="fas fa-plus"></i>
      </button>
    </div>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="page-content">

    <div class="leyenda-row">
      <span class="leyenda-item">
        <span class="dot dot-green"></span> +30 días
      </span>
      <span class="leyenda-item">
        <span class="dot dot-yellow"></span> 10-30 días
      </span>
      <span class="leyenda-item">
        <span class="dot dot-red"></span> &lt;10 días
      </span>
    </div>

    <div class="alertas-list" *ngIf="recordatorios.length > 0">
      <div class="alerta-card" *ngFor="let r of recordatorios">
        <div class="card-border" [ngClass]="getBorderClass(r)"></div>
        <div class="card-body">
          <div class="alerta-top">
            <div class="alerta-icon-box" [ngClass]="getIconBgClass(r)">
              <i class="fas fa-bell" [ngClass]="getIconColorClass(r)"></i>
            </div>
            <div class="alerta-info">
              <div class="alerta-header-row">
                <span class="alerta-nombre">{{ r.titulo }}</span>
                <span class="dias-badge" [ngClass]="getDiasBadgeClass(r)">{{ getDiasTexto(r) }}</span>
              </div>
              <span class="alerta-sub" *ngIf="getPlaca(r)">{{ getPlaca(r) }}</span>
              <span class="alerta-sub" *ngIf="r.descripcion">{{ r.descripcion }}</span>
              <div class="alerta-vence">
                <i class="fas fa-calendar"></i>
                <span>Vence: {{ r.fechaVencimiento }}</span>
              </div>
            </div>
          </div>
          <div class="alerta-actions">
            <button class="btn-completar" (click)="completar(r)">
              <i class="fas fa-check"></i> Completar
            </button>
            <button class="btn-posponer" (click)="posponer(r)">
              <i class="fas fa-clock"></i> +7 días
            </button>
          </div>
        </div>
      </div>
    </div>

    <div class="empty-state" *ngIf="recordatorios.length === 0">
      <div class="empty-icon-box">
        <i class="fas fa-chart-bar"></i>
      </div>
      <p>Gestionando {{ vehiculosActivos }} vehículos activos</p>
    </div>

  </div>
</ion-content>

<div class="bottom-nav">

  <div
    class="nav-item"
    [class.active]="activeTab === 'vehiculos'"
    routerLink="/vehiculos"
    (click)="activeTab = 'vehiculos'"
  >
    <div class="nav-icon">
      <i class="fas fa-car-side"></i>
    </div>
    <span>Vehículos</span>
  </div>

  <div
    class="nav-item"
    [class.active]="activeTab === 'mantenimientos'"
    routerLink="/mantenimientos"
    (click)="activeTab = 'mantenimientos'"
  >
    <div class="nav-icon">
      <i class="fas fa-screwdriver-wrench"></i>
    </div>
    <span>Mantenimiento</span>
  </div>

  <div
    class="nav-item"
    [class.active]="activeTab === 'gastos'"
    routerLink="/gastos"
    (click)="activeTab = 'gastos'"
  >
    <div class="nav-icon">
      <i class="fas fa-money-bill-wave"></i>
    </div>
    <span>Gastos</span>
  </div>

  <div
    class="nav-item"
    [class.active]="activeTab === 'recordatorios'"
    routerLink="/recordatorios"
    (click)="activeTab = 'recordatorios'"
  >
    <div class="nav-icon">
      <i class="fas fa-bell"></i>
    </div>
    <span>Notificaciones</span>
  </div>

  <div
    class="nav-item"
    [class.active]="activeTab === 'estadisticas'"
    routerLink="/estadisticas"
    (click)="activeTab = 'estadisticas'"
  >
    <div class="nav-icon">
      <i class="fas fa-chart-bar"></i>
    </div>
    <span>Estadísticas</span>
  </div>

  <div
    class="nav-item"
    [class.active]="activeTab === 'perfil'"
    routerLink="/perfil"
    (click)="activeTab = 'perfil'"
  >
    <div class="nav-icon">
      <i class="fas fa-user"></i>
    </div>
    <span>Perfil</span>
  </div>

</div>
