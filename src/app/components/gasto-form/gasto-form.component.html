<div class="modal-wrapper">

  <div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-icon-box icon-green">
        <i class="fas fa-money-bill-wave"></i>
      </div>
      <div>
        <h2 class="modal-title">Nuevo Gasto</h2>
        <p class="modal-subtitle">Registra un gasto de tu vehículo</p>
      </div>
    </div>
    <button class="close-btn" (click)="cerrar()">
      <i class="fas fa-xmark"></i>
    </button>
  </div>

  <div class="modal-body">

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-car label-icon"></i> Vehículo
      </label>
      <div class="select-wrapper">
        <select class="form-select" [(ngModel)]="form.vehiculoId">
          <option value="" disabled selected>Selecciona un vehículo</option>
          <option *ngFor="let v of vehiculos" [value]="v.id">
            {{ v.placa }} — {{ v.marca }} {{ v.modelo }}
          </option>
        </select>
        <i class="fas fa-chevron-down select-arrow"></i>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-tag label-icon"></i> Categoría
      </label>
      <div class="chips-group">
        <button
          class="chip"
          *ngFor="let c of categorias"
          [class.active]="form.categoria === c.valor"
          (click)="form.categoria = c.valor"
        >
          <i [class]="c.icono"></i> {{ c.label }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-pen label-icon"></i> Descripción
      </label>
      <input
        class="form-input"
        type="text"
        placeholder="Ej: Tanqueo full"
        [(ngModel)]="form.descripcion"
      />
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-dollar-sign label-icon"></i> Monto
        </label>
        <div class="input-with-prefix">
          <span class="input-prefix">$</span>
          <input
            class="form-input has-prefix"
            type="number"
            placeholder="0"
            [(ngModel)]="form.monto"
            min="0"
          />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-calendar label-icon"></i> Fecha
        </label>
        <input
          class="form-input"
          type="date"
          [(ngModel)]="form.fecha"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-note-sticky label-icon"></i> Notas
        <span class="label-optional">opcional</span>
      </label>
      <textarea
        class="form-textarea"
        placeholder="Agrega notas adicionales..."
        [(ngModel)]="form.notas"
        rows="3"
      ></textarea>
    </div>

  </div>

    <div class="modal-footer">
    <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
    <button class="btn-save" (click)="guardar()" [disabled]="!formValido()">
      <i class="fas fa-floppy-disk"></i>
      {{ esEdicion ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>

</div>
