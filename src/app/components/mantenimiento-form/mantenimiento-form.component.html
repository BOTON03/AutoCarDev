<div class="modal-wrapper">

  <div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-icon-box icon-orange">
        <i class="fas fa-screwdriver-wrench"></i>
      </div>
      <div>
        <h2 class="modal-title">Nuevo Mantenimiento</h2>
        <p class="modal-subtitle">Registra el servicio del vehículo</p>
      </div>
    </div>
    <button class="close-btn" (click)="cerrar()">
      <i class="fas fa-xmark"></i>
    </button>
  </div>

  <div class="modal-body">

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-car label-icon"></i> Vehículo
      </label>
      <div class="select-wrapper">
        <select class="form-select" [(ngModel)]="form.vehiculoId">
          <option value="" disabled selected>Selecciona un vehículo</option>
          <option *ngFor="let v of vehiculos" [value]="v.id">
            {{ v.placa }} — {{ v.marca }} {{ v.modelo }}
          </option>
        </select>
        <i class="fas fa-chevron-down select-arrow"></i>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-list label-icon"></i> Tipo de mantenimiento
      </label>
      <div class="chips-group">
        <button
          class="chip"
          [class.active]="form.tipo === 'preventivo'"
          (click)="form.tipo = 'preventivo'"
        >
          <i class="fas fa-shield-halved"></i> Preventivo
        </button>
        <button
          class="chip"
          [class.active]="form.tipo === 'correctivo'"
          (click)="form.tipo = 'correctivo'"
        >
          <i class="fas fa-triangle-exclamation"></i> Correctivo
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-pen label-icon"></i> Descripción
      </label>
      <input
        class="form-input"
        type="text"
        placeholder="Ej: Cambio de aceite"
        [(ngModel)]="form.descripcion"
      />
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-calendar label-icon"></i> Fecha
        </label>
        <input
          class="form-input"
          type="date"
          [(ngModel)]="form.fecha"
        />
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-gauge-high label-icon"></i> Kilometraje
        </label>
        <div class="input-with-suffix">
          <input
            class="form-input"
            type="number"
            placeholder="0"
            [(ngModel)]="form.kilometraje"
            min="0"
          />
          <span class="input-suffix">km</span>
        </div>
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-dollar-sign label-icon"></i> Costo
        </label>
        <div class="input-with-prefix">
          <span class="input-prefix">$</span>
          <input
            class="form-input has-prefix"
            type="number"
            placeholder="0"
            [(ngModel)]="form.costo"
            min="0"
          />
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-location-dot label-icon"></i> Lugar
        </label>
        <input
          class="form-input"
          type="text"
          placeholder="Ej: Taller Centro"
          [(ngModel)]="form.lugar"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-circle-check label-icon"></i> Estado
      </label>
      <div class="chips-group">
        <button
          class="chip"
          [class.active]="form.estado === 'pendiente'"
          (click)="form.estado = 'pendiente'"
        >
          Pendiente
        </button>
        <button
          class="chip chip-green"
          [class.active]="form.estado === 'completado'"
          (click)="form.estado = 'completado'"
        >
          Completado
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-calendar-plus label-icon"></i> Próxima fecha
        <span class="label-optional">opcional</span>
      </label>
      <input
        class="form-input"
        type="date"
        [(ngModel)]="form.proximaFecha"
      />
    </div>

    <div class="form-group">
      <div class="toggle-row">
        <div class="toggle-info">
          <i class="fas fa-bell label-icon"></i>
          <span class="form-label-inline">Activar recordatorio</span>
        </div>
        <div class="toggle-wrapper">
          <input
            type="checkbox"
            id="toggle-recordatorio"
            class="toggle-input"
            [(ngModel)]="form.recordatorioActivo"
          />
          <label for="toggle-recordatorio" class="toggle-label"></label>
        </div>
      </div>
    </div>

  </div>

  <div class="modal-footer">
    <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
    <button class="btn-save" (click)="guardar()" [disabled]="!formValido()">
      <i class="fas fa-floppy-disk"></i>
      {{ esEdicion ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>

</div>
