<div class="modal-wrapper">

  <div class="modal-header">
    <div class="modal-header-left">
      <div class="modal-icon-box">
        <i class="fas fa-car"></i>
      </div>
      <div>
        <h2 class="modal-title">{{ esEdicion ? 'Editar Vehículo' : 'Nuevo Vehículo' }}</h2>
        <p class="modal-subtitle">{{ esEdicion ? 'Actualiza los datos' : 'Completa la información' }}</p>
      </div>
    </div>
    <button class="close-btn" (click)="cerrar()">
      <i class="fas fa-xmark"></i>
    </button>
  </div>

  <div class="modal-body">

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-id-card label-icon"></i> Placa
      </label>
      <input
        class="form-input"
        type="text"
        placeholder="Ej: ABC-123"
        [(ngModel)]="form.placa"
        (input)="form.placa = form.placa.toUpperCase()"
        maxlength="8"
      />
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-building label-icon"></i> Marca
        </label>
        <input
          class="form-input"
          type="text"
          placeholder="Ej: Toyota"
          [(ngModel)]="form.marca"
        />
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-car-rear label-icon"></i> Modelo
        </label>
        <input
          class="form-input"
          type="text"
          placeholder="Ej: Corolla"
          [(ngModel)]="form.modelo"
        />
      </div>
    </div>

    <div class="form-row-2">
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-calendar label-icon"></i> Año
        </label>
        <input
          class="form-input"
          type="number"
          placeholder="Ej: 2020"
          [(ngModel)]="form.anio"
          min="1980"
          [max]="anioActual"
        />
      </div>
      <div class="form-group">
        <label class="form-label">
          <i class="fas fa-palette label-icon"></i> Color
        </label>
        <input
          class="form-input"
          type="text"
          placeholder="Ej: Blanco"
          [(ngModel)]="form.color"
        />
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-gas-pump label-icon"></i> Combustible
      </label>
      <div class="chips-group">
        <button
          class="chip"
          *ngFor="let c of combustibles"
          [class.active]="form.combustible === c.valor"
          (click)="form.combustible = c.valor"
        >
          <i [class]="c.icono"></i> {{ c.label }}
        </button>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-gauge-high label-icon"></i> Kilometraje actual
      </label>
      <div class="input-with-suffix">
        <input
          class="form-input"
          type="number"
          placeholder="Ej: 45000"
          [(ngModel)]="form.kilometraje"
          min="0"
        />
        <span class="input-suffix">km</span>
      </div>
    </div>

    <div class="form-group" *ngIf="form.combustible === 'Eléctrico'">
      <label class="form-label">
        <i class="fas fa-battery-three-quarters label-icon"></i> Batería actual
      </label>
      <div class="input-with-suffix">
        <input
          class="form-input"
          type="number"
          placeholder="Ej: 88"
          [(ngModel)]="form.bateria"
          min="0"
          max="100"
        />
        <span class="input-suffix">%</span>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">
        <i class="fas fa-circle-check label-icon"></i> Estado
      </label>
      <div class="chips-group">
        <button
          class="chip"
          *ngFor="let e of estados"
          [class.active]="form.estado === e.valor"
          [ngClass]="form.estado === e.valor ? e.activeClass : ''"
          (click)="form.estado = e.valor"
        >
          {{ e.label }}
        </button>
      </div>
    </div>

  </div>

  <div class="modal-footer">
    <button class="btn-cancel" (click)="cerrar()">Cancelar</button>
    <button class="btn-save" (click)="guardar()" [disabled]="!formValido()">
      <i class="fas fa-floppy-disk"></i>
      {{ esEdicion ? 'Actualizar' : 'Guardar' }}
    </button>
  </div>

</div>
